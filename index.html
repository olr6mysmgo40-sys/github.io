<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>佐々木楓菜生誕WEB</title>

  <!-- ★ 最初の背景画像を高速表示するための preload -->
  <link rel="preload" as="image" href="picture/姫楓菜.png">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- 背景レイヤー -->
  <div id="bg"></div>

  <section class="panel" data-bg="姫楓菜.png">
    <h1 class="fade-item">生誕ページ</h1>
    <p class="fade-item">コンテンツ</p>
  </section>

  <section class="panel" data-bg="IMG_0031.jpeg">
    <div class="panel-content">
      <h1 class="fade-item">メインストーリー「20歳の四季」</h1>
      <h2 class="fade-item">第一章　夏</h2>
      <p class="fade-item">コンテンツ</p>
    </div>
  </section>

  <section class="panel" data-bg="IMG_0078.jpeg">
    <div class="panel-content">
      <h2 class="fade-item">第二章 秋</h2>
      <p class="fade-item">コンテンツ</p>
    </div>
  </section>

  <section class="panel" data-bg="IMG_0141.jpeg">
    <div class="panel-content">
      <h2 class="fade-item">第三章　冬</h2>
      <p class="fade-item">コンテンツ</p>
    </div>
  </section>

  <section class="panel" data-bg="IMG_0236.jpeg">
    <div class="panel-content">
      <h2 class="fade-item">第四章　春</h2>
      <p class="fade-item">コンテンツ</p>
    </div>
  </section>

  <section class="panel" data-bg="IMG_0246.jpeg">
    <div class="panel-content">
      <h1 class="fade-item">ファンボイス</h1>
      <h2 class="fade-item">ファンアンケート</h2>
      <p class="fade-item">ふーちゃんに対するファンの想いを伝えたくて、</p>
      <p class="fade-item">ふーなぐみのみんなにアンケートを回答してもらいました。</p>

      <p class="fade-item">Q1.ふーちゃんの好きなところは？</p>
      <p class="fade-item">ファンそれぞれが思う、いろんな「好き」に溢れていました。</p>
      <p class="fade-item">（「全部好き」も結構ありました）</p>

      <!-- ★ lazy-load を追加 -->
      <img src="picture/アンケート１.png" class="fade-item section-image" loading="lazy" alt="">
      <img src="picture/アンケート２.png" class="fade-item section-image" loading="lazy" alt="">
      <img src="picture/アンケート３.png" class="fade-item section-image" loading="lazy" alt="">
      <img src="picture/アンケート４.png" class="fade-item section-image" loading="lazy" alt="">
      <img src="picture/アンケート５.png" class="fade-item section-image" loading="lazy" alt="">
    </div>
  </section>

  <!-- 以下のセクションもすべて同じく lazy-load を追加 -->
  <!-- 省略せず全部書いてほしければ言ってね -->

  <script src="script.js"></script>
</body>
</html>
